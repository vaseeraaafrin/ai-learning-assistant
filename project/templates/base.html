<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Learning Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% if session.user_id %}
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">AI Learning Assistant</div>
            <div class="nav-menu">
                <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
                <a href="{{ url_for('quiz') }}" class="nav-link">Quiz</a>
                <a href="{{ url_for('chat') }}" class="nav-link">AI Chat</a>
                <a href="{{ url_for('logout') }}" class="nav-link logout">Logout ({{ session.username }})</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2024 AI Learning Assistant - Your Personalized Learning Platform</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
